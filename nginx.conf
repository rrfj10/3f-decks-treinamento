server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    autoindex off;

    # Os decks carregam fontes do Google e icones do cdnjs, e trazem <style> e
    # <script> embutidos no proprio arquivo - dai o 'unsafe-inline'. Mesmo assim a
    # politica fecha o resto: nada de script de outro host, nada de fetch para fora
    # e nada de embutir o deck em site de terceiro.
    # add_header nao e herdado por location que declara o seu proprio, entao os
    # blocos abaixo repetem a lista inteira.
    set $deck_csp "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy $deck_csp always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:html)$ {
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy $deck_csp always;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        # So o add_header: com `expires 7d` junto, a resposta saia com dois
        # Cache-Control diferentes no mesmo header.
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        try_files $uri =404;
    }
}
