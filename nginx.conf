server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    autoindex off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:html)$ {
        add_header Cache-Control "no-store";
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
